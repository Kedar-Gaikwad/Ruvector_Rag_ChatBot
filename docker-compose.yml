# ============================================================================
# Local Development Docker Compose
# Mirrors the multi-service AWS architecture for local testing
# ============================================================================
services:

  ruvector-db:
    image: ruvnet/ruvector:latest
    container_name: ruvector-db
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - ruvector_data:/var/lib/ruvector/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  rag-chatbot:
    build:
      context: ./rag_app
      dockerfile: Dockerfile
    container_name: rag-chatbot
    restart: unless-stopped
    ports:
      - "80:8000"
    environment:
      - RUVECTOR_URL=http://ruvector-db:6333
      - EMBEDDING_PROVIDER=bedrock
      - LLM_PROVIDER=bedrock
      - AWS_REGION=us-east-1
      # For local dev, pass AWS credentials from host
      # - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      # - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    depends_on:
      ruvector-db:
        condition: service_healthy

volumes:
  ruvector_data: